<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferremas - Catálogo Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 800; color: #b0df1a; text-decoration: none; }
        .logo span { color: white; }
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .btn-cart { background-color: #0052cc; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card-producto { background: white; border: 1px solid #e4e6eb; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }
        .sku { font-size: 11px; color: #8d949e; font-weight: bold; }
        .nombre { font-size: 16px; font-weight: bold; margin: 5px 0; color: #1c1e21; }
        .marca { font-size: 13px; color: #606770; margin-bottom: 10px; }
        .precio { font-size: 18px; font-weight: 800; color: #2c3e50; margin-bottom: 5px; }
        .stock { font-size: 12px; color: #278048; font-weight: 600; margin-bottom: 15px; }
        .stock.low { color: #ff3b30; }

        .compra-control { display: flex; gap: 8px; margin-top: 10px; }
        .input-cant { width: 60px; padding: 8px; border: 1px solid #ccd0d5; border-radius: 6px; text-align: center; font-weight: bold; }
        .btn-add { flex: 1; background-color: #b0df1a; color: #2c3e50; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-add:hover { background-color: #9cc417; }
    </style>
</head>
<body>

    <header>
        <a href="/inicio/" class="logo">🛠️ Ferre<span>mas</span></a>
        <div class="nav-links">
            <span id="user-display">👤 Invitado</span>
            <a href="/checkout/" class="btn-cart">🛒 Carrito (<span id="cart-count">0</span>)</a>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 20px;">Nuestros Productos</h2>
        <div class="grid-productos" id="lista-productos"></div>
    </div>

    <script>
        const PRODUCTOS_BASE = [
            { sku: "SEG-ARN-04P", nombre: "Arnés de Seguridad Profesional de 4 Puntas", marca: "Steelpro", precio: 34990, stock: 45 },
            { sku: "SEG-ZAP-EDEL", nombre: "Zapato de Seguridad Premium Composite", marca: "Edelbrock", precio: 48990, stock: 60 },
            { sku: "SEG-ANT-3M01", nombre: "Antiparra de Seguridad Antiempañante", marca: "3M", precio: 8990, stock: 120 },
            { sku: "SEG-GUA-CABR", nombre: "Guante de Cabritilla Reforzado", marca: "Steelpro", precio: 5490, stock: 200 },
            { sku: "HOG-CER-SCAN", nombre: "Cerradura de Sobreponer Standard", marca: "Scanavini", precio: 24990, stock: 35 },
            { sku: "HOG-PIN-CER1G", nombre: "Set de Pintura Látex Blanco 1 Galón", marca: "Ceresita", precio: 18990, stock: 50 },
            { sku: "HOG-FOC-LED50", nombre: "Foco Proyector LED Exterior 50W", marca: "Halux", precio: 12990, stock: 85 },
            { sku: "HOG-ALA-VOLT3M", nombre: "Alargador Eléctrico Certificado 5T", marca: "Voltex", precio: 7490, stock: 150 },
            { sku: "MAN-LLA-STAN12", nombre: "Juego de Llaves de Punta y Corona", marca: "Stanley", precio: 29990, stock: 40 },
            { sku: "MAN-ALI-IRW10", nombre: "Alicate de Presión Tipo Caimán 10\"", marca: "Irwin", precio: 14990, stock: 55 }
        ];

        let carrito = JSON.parse(localStorage.getItem('carrito_items')) || [];

        function inicializarCatalogo() {
            const email = localStorage.getItem('usuario_logueado');
            if(email) document.getElementById('user-display').innerText = `👤 ${email}`;
            actualizarContadorCarrito();
            renderizar(PRODUCTOS_BASE);
        }

        function renderizar(productos) {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            productos.forEach(p => {
                contenedor.innerHTML += `
                    <div class="card-producto">
                        <div>
                            <span class="sku">SKU: ${p.sku}</span>
                            <div class="nombre">${p.nombre}</div>
                            <div class="marca">${p.marca}</div>
                        </div>
                        <div>
                            <div class="precio">$${p.precio.toLocaleString('es-CL')}</div>
                            <div class="stock">Disponibles: ${p.stock} un.</div>
                            <div class="compra-control">
                                <input type="number" id="cant-${p.sku}" class="input-cant" value="1" min="1" max="${p.stock}">
                                <button class="btn-add" onclick="agregarAlCarrito('${p.sku}', '${p.nombre}', ${p.precio}, ${p.stock})">Agregar</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function agregarAlCarrito(sku, nombre, precio, stockMaximo) {
            const inputCant = document.getElementById(`cant-${sku}`);
            const cantidadSolicitada = parseInt(inputCant.value);

            if (isNaN(cantidadSolicitada) || cantidadSolicitada <= 0) return;

            if (cantidadSolicitada > stockMaximo) {
                alert(`❌ Stock insuficiente. Solo quedan ${stockMaximo} unidades en sistema.`);
                return;
            }

            const itemExistente = carrito.find(item => item.sku === sku);
            const cantidadTotal = itemExistente ? (itemExistente.cantidad + cantidadSolicitada) : cantidadSolicitada;

            if (cantidadTotal > stockMaximo) {
                alert(`❌ Error: El total en tu carrito supera el stock límite de ${stockMaximo} unidades.`);
                return;
            }

            if (itemExistente) {
                itemExistente.cantidad = cantidadTotal;
            } else {
                carrito.push({ sku, nombre, precio, cantidad: cantidadSolicitada });
            }

            localStorage.setItem('carrito_items', JSON.stringify(carrito));
            actualizarContadorCarrito();
            alert(`✅ Agregadas ${cantidadSolicitada} unidades correctamente.`);
        }

        function actualizarContadorCarrito() {
            document.getElementById('cart-count').innerText = carrito.reduce((sum, item) => sum + item.cantidad, 0);
        }

        window.onload = inicializarCatalogo;
    </script>
</body>
</html>
