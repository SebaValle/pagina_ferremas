<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferremas - Control de Bodega</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #333; min-height: 100vh; padding-bottom: 50px; }
        header { background-color: #2c3e50; color: white; padding: 15px 20px; }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 800; color: #b0df1a; text-decoration: none; }
        .logo span { color: white; }
        .btn-logout { background: transparent; border: 1px solid #ff3b30; color: #ff3b30; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; text-decoration: none; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e4e6eb; padding-bottom: 10px; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: 600; color: #606770; border-radius: 6px; }
        .tab.active { background: #2c3e50; color: white; }
        .orders-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .order-card { background: white; border: 1px solid #e4e6eb; border-radius: 8px; padding: 20px; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .order-id { font-weight: 700; font-size: 16px; color: #2c3e50; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .badge.pendiente { background-color: #fff3cd; color: #856404; }
        .badge.listo { background-color: #d4edda; color: #155724; }
        .order-items { margin-bottom: 15px; background: #fafafa; padding: 12px; border-radius: 6px; }
        .item-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px dashed #e4e6eb; }
        .item-row:last-child { border-bottom: none; }
        .item-qty { color: #0052cc; font-weight: 700; }
        .btn-action { background-color: #278048; color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="#" class="logo">🛠️ Ferre<span>mas Bodega</span></a>
            <div>
                <a href="/" class="btn-logout" onclick="localStorage.removeItem('empleado_logueado')">Cerrar Sesión</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 style="margin-bottom: 20px;">📦 Control Operativo de Pedidos Recientes</h1>
        
        <div class="tabs">
            <div class="tab active" id="tab-pendientes" onclick="filtrarPedidos('pendiente')">📥 Pendientes por Armar</div>
            <div class="tab" id="tab-listos" onclick="filtrarPedidos('listo')">✅ Listos para Despacho</div>
        </div>

        <div class="orders-grid" id="contenedor-pedidos"></div>
    </div>

    <script>
        let filtroActual = 'pendiente';

        const PEDIDOS_PRECARGADOS = [
            {
                id: 4821,
                tipo_entrega: "despacho",
                estado: "pendiente",
                items: [
                    { producto_nombre: "Arnés de Seguridad Profesional de 4 Puntas", cantidad: 2 },
                    { producto_nombre: "Antiparra de Seguridad Antiempañante", cantidad: 3 }
                ]
            },
            {
                id: 7109,
                tipo_entrega: "retiro",
                estado: "pendiente",
                items: [
                    { producto_nombre: "Juego de Llaves de Punta y Corona", cantidad: 1 }
                ]
            }
        ];

        function cargarPedidos() {
            let pedidosSistema = JSON.parse(localStorage.getItem('pedidos_sistema')) || [];
            
            if (pedidosSistema.length === 0) {
                pedidosSistema = PEDIDOS_PRECARGADOS;
                localStorage.setItem('pedidos_sistema', JSON.stringify(pedidosSistema));
            }
            
            renderizarPedidos(pedidosSistema);
        }

        function renderizarPedidos(pedidos) {
            const contenedor = document.getElementById('contenedor-pedidos');
            contenedor.innerHTML = '';

            const filtrados = pedidos.filter(p => p.estado === filtroActual);

            if (filtrados.length === 0) {
                contenedor.innerHTML = `<div style="text-align:center; padding:40px; color:#8d949e; background:white; border-radius:8px;">No hay órdenes en este estado actualmente.</div>`;
                return;
            }

            filtrados.forEach(pedido => {
                let htmlItems = '';
                pedido.items.forEach(i => {
                    htmlItems += `
                        <div class="item-row">
                            <span>🛠️ ${i.producto_nombre}</span>
                            <span class="item-qty">x${i.cantidad}</span>
                        </div>`;
                });

                const metodo = pedido.tipo_entrega === 'despacho' ? '🚚 Despacho a Domicilio (Cargo +$5.000)' : '🏬 Retiro Directo en Tienda';
                const boton = pedido.estado === 'pendiente' 
                    ? `<button class="btn-action" onclick="autorizarPedido(${pedido.id})">📦 Autorizar y Armar Pedido</button>` : '';

                contenedor.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">Orden N° ${pedido.id}</span>
                            <span class="badge ${pedido.estado}">${pedido.estado}</span>
                        </div>
                        <div class="order-items">${htmlItems}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:13px; font-weight:600; color:#606770;">${metodo}</span>
                            ${boton}
                        </div>
                    </div>`;
            });
        }

        function filtrarPedidos(estado) {
            filtroActual = estado;
            document.getElementById('tab-pendientes').classList.remove('active');
            document.getElementById('tab-listos').classList.remove('active');
            if (estado === 'pendiente') document.getElementById('tab-pendientes').classList.add('active');
            else document.getElementById('tab-listos').classList.add('active');
            cargarPedidos();
        }

        function autorizarPedido(pedidoId) {
            let pedidosSistema = JSON.parse(localStorage.getItem('pedidos_sistema')) || [];
            const pedido = pedidosSistema.find(p => p.id === pedidoId);
            
            if(pedido) {
                pedido.estado = "listo";
                localStorage.setItem('pedidos_sistema', JSON.stringify(pedidosSistema));
                alert(`✅ Orden N° ${pedidoId} empaquetada con éxito.`);
                cargarPedidos();
            }
        }

        window.onload = cargarPedidos;
    </script>
</body>
</html>
