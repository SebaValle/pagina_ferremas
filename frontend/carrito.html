<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferremas - Tu Carrito de Compras</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #333; min-height: 100vh; padding-bottom: 40px; }

        /* HEADER */
        header { background-color: #ffffff; border-bottom: 1px solid #e4e6eb; padding: 15px 20px; margin-bottom: 30px; }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 800; color: #b0df1a; text-shadow: 1px 1px 1px #333; text-decoration: none; }
        .logo span { color: #2c3e50; }
        .volver-link { color: #0052cc; text-decoration: none; font-size: 14px; font-weight: 600; }
        .volver-link:hover { text-decoration: underline; }

        /* CONTENEDOR PRINCIPAL DOS COLUMNAS */
        .checkout-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        
        @media (max-width: 768px) {
            .checkout-container { grid-template-columns: 1fr; }
        }

        .box { background: white; padding: 25px; border-radius: 8px; border: 1px solid #e4e6eb; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        h2 { color: #1c1e21; font-size: 20px; margin-bottom: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        
        /* TABLA DE PRODUCTOS */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 14px; border-bottom: 1px solid #e4e6eb; text-align: left; font-size: 14px; }
        th { background-color: #fafafa; color: #606770; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .prod-title { font-weight: 600; color: #1c1e21; }
        
        /* RESUMEN DE COSTOS */
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: #606770; }
        .summary-total { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e4e6eb; font-size: 18px; font-weight: 700; color: #ff3b30; }
        
        /* FORMULARIOS Y BOTONES */
        label { display: block; font-size: 13px; font-weight: 600; color: #4f5660; margin-bottom: 8px; margin-top: 15px; }
        select { width: 100%; padding: 12px; border: 1px solid #ccd0d5; border-radius: 6px; font-size: 14px; outline: none; background-color: #f0f2f5; }
        
        .btn-pay { background-color: #ff3b30; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 20px; transition: background 0.2s; }
        .btn-pay:hover { background-color: #e0241b; }
        
        .btn-vaciar { background-color: transparent; color: #7f8c8d; border: 1px solid #ccd0d5; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 10px; font-weight: 600; transition: background 0.2s; }
        .btn-vaciar:hover { background-color: #f2f3f5; color: #c0392b; border-color: #c0392b; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="/catalogo/" class="logo">🛠️ Ferre<span>mas</span></a>
            <a href="/catalogo/" class="volver-link">← Seguir comprando</a>
        </div>
    </header>

    <div class="checkout-container">
        
        <div class="box">
            <h2>🛒 Carrito de Compras</h2>
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio Unidad</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="lista-carrito">
                    </tbody>
            </table>
        </div>

        <div class="box">
            <h2>Resumen de la orden</h2>
            
            <div class="summary-box">
                <div class="summary-row">
                    <span>Subtotal productos</span>
                    <span id="subtotal-valores">$0</span>
                </div>
                <div class="summary-row">
                    <span>Envío / Retiro</span>
                    <span style="color: #27ae60; font-weight: 600;">Gratis</span>
                </div>
                <div class="summary-total">
                    <span>Total a pagar:</span>
                    <span id="total-compra">$0</span>
                </div>
            </div>

            <label for="tipo_entrega">Método de entrega</label>
            <select id="tipo_entrega">
                <option value="despacho">🚚 Despacho a Domicilio</option>
                <option value="retiro">🏬 Retiro en Tienda (Gratis)</option>
            </select>

            <button class="btn-pay" onclick="enviarPedidoADjango()">Proceder al Pago Seguro</button>
            <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar mi Carrito</button>
        </div>

    </div>

    <script>
        let carrito = JSON.parse(localStorage.getItem('carrito_ferremas')) || [];

        function renderizarCarrito() {
            const tbody = document.getElementById('lista-carrito');
            const subtotalValores = document.getElementById('subtotal-valores');
            const totalSpan = document.getElementById('total-compra');
            tbody.innerHTML = '';
            let total = 0;

            if (carrito.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #90949c; padding: 40px 0;">Tu carrito está vacío. Agrega productos desde el catálogo.</td></tr>`;
                subtotalValores.innerText = `$0`;
                totalSpan.innerText = `$0`;
                return;
            }

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                tbody.innerHTML += `
                    <tr>
                        <td class="prod-title">${item.nombre}</td>
                        <td>$${item.precio.toLocaleString('es-CL')}</td>
                        <td style="font-weight: 600;">${item.cantidad}</td>
                        <td style="font-weight: 600; color: #1c1e21;">$${subtotal.toLocaleString('es-CL')}</td>
                    </tr>
                `;
            });

            subtotalValores.innerText = `$${total.toLocaleString('es-CL')}`;
            totalSpan.innerText = `$${total.toLocaleString('es-CL')}`;
        }

        function vaciarCarrito() {
            if(confirm("¿Estás seguro de que quieres quitar todos los elementos de tu carro?")) {
                localStorage.removeItem('carrito_ferremas');
                carrito = [];
                renderizarCarrito();
            }
        }

        function enviarPedidoADjango() {
            if (carrito.length === 0) {
                alert("Debes añadir al menos un producto para proceder al pago.");
                return;
            }

            const tipoEntrega = document.getElementById('tipo_entrega').value;
            const itemsParaAPI = carrito.map(item => ({
                producto: item.id,
                cantidad: item.cantidad
            }));

            const datosPedido = {
                cliente: 1, // ID de pruebas
                vendedor: null, 
                sucursal: 1, 
                tipo_entrega: tipoEntrega,
                estado: "pendiente",
                items: itemsParaAPI
            };

            fetch('http://127.0.0.1:8000/api/pedidos/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datosPedido)
            })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Error en el servidor de Ferremas.');
            })
            .then(pedidoCreado => {
                localStorage.removeItem('carrito_ferremas');
                window.location.href = `/checkout/exito/?pedido_id=${pedidoCreado.id}`;
            })
            .catch(error => alert('Hubo un problema: ' + error.message));
        }

        renderizarCarrito();
    </script>
</body>
</html>
